
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubab Digital - TikTok Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h1 { color: #fe2c55; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        input { padding: 15px; width: 90%; border: 2px solid #eee; border-radius: 10px; outline: none; margin-bottom: 15px; font-size: 16px; }
        input:focus { border-color: #fe2c55; }
        button { padding: 15px; background-color: #fe2c55; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #ef2950; }
        #result { margin-top: 25px; }
        .download-link { display: block; padding: 15px; background-color: #25d366; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 10px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>TikTok Saver</h1>
    <p>Download videos without watermark instantly!</p>
    <input type="text" id="videoLink" placeholder="Paste TikTok Video Link Here">
    <button onclick="downloadVideo()" id="btnText">Get Video</button>
    <div id="result"></div>
</div>

<script>
    async function downloadVideo() {
        const link = document.getElementById('videoLink').value;
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('btnText');
        
        if(!link) { alert("Please paste a link first!"); return; }
        
        btn.innerText = "Processing...";
        btn.disabled = true;
        resultDiv.innerHTML = "Finding video on servers...";

        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': '002c1cf3bemshd1919bc90b7468fp1fbcf7jsn4ed5dfc00745',
                'x-rapidapi-host': 'tiktok-download-video1.p.rapidapi.com'
            }
        };

        try {
            const response = await fetch(`https://tiktok-download-video1.p.rapidapi.com/getVideo?url=${encodeURIComponent(link)}`, options);
            const data = await response.json();
            
            if(data.data && data.data.play) {
                resultDiv.innerHTML = `
                    <p style="color:green; font-weight:bold;">Video Found!</p>
                    <a href="${data.data.play}" target="_blank" class="download-link">Click to Download Video</a>
                `;
            } else {
                resultDiv.innerHTML = "<p style='color:red;'>Link invalid ya video nahi mili. Dobara check karein.</p>";
            }
        } catch (error) {
            resultDiv.innerHTML = "<p style='color:red;'>Server error! Please try again later.</p>";
        } finally {
            btn.innerText = "Get Video";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
