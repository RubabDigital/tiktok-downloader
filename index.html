<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubab Digital - TikTok Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 50px; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; }
        h1 { color: #fe2c55; margin-bottom: 20px; }
        input { padding: 15px; width: 80%; border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: #fe2c55; }
        button { padding: 15px 30px; background-color: #fe2c55; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 85%; }
        button:hover { background-color: #ef2950; }
        #result { margin-top: 25px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>TikTok Saver</h1>
    <p>Paste your TikTok link below to download without watermark:</p>
    <input type="text" id="videoLink" placeholder="https://www.tiktok.com/@user/video/...">
    <br>
    <button onclick="downloadVideo()">Get Video</button>
    <div id="result">Your download link will appear here...</div>
</div>

<script>
    function downloadVideo() {
        let link = document.getElementById('videoLink').value;
        if(link === "") {
            alert("Please paste a link!");
            return;
        }
        document.getElementById('result').innerText = "Connecting to Rubab's Digital Engine...";
    }
</script>

</body>
</html>
